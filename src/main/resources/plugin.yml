name: XaniSetHome
version: '1.0.0'
main: ua.xani4ka.xanisethome.XaniSetHomePlugin
api-version: '1.21'
author: bogda
description: Custom SetHome plugin with legacy migration, language support, and configurable home limits.
commands:
  sethome:
    description: Creates a home with the given name
    usage: /<command> <name>
    permission: xanisethome.sethome
  home:
    description: Teleports to a home with the given name
    usage: /<command> <name>
    permission: xanisethome.home
  delhome:
    description: Deletes a home with the given name
    usage: /<command> <name>
    permission: xanisethome.delhome
  admindelhome:
    description: Admin command to delete a player's home
    usage: /<command> <player> <home>
    permission: xanisethome.admin.delhome
  adminlisthomes:
    description: Admin command to list all homes of a player
    usage: /<command> <player>
    permission: xanisethome.admin.listhomes
  sethomemigrate:
    description: Imports homes from legacy-homes/homes.yml
    usage: /<command>
permissions:
  xanisethome.sethome:
    default: true
  xanisethome.home:
    default: true
  xanisethome.delhome:
    default: true
  xanisethome.admin.delhome:
    default: op
  xanisethome.admin.listhomes:
    default: op
